name: Build Safari (macOS)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.6.2). Leave blank to skip release and only upload artifact.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-safari:
    name: Build Safari macOS app
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: |
            - args: [--frozen-lockfile]

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Safari web extension resources
        run: pnpm build-safari

      - name: Convert to Xcode project
        run: |
          xcrun safari-web-extension-converter ./extension-safari \
            --project-location ./extension-safari-macos \
            --macos-only \
            --bundle-identifier cn.celeus.bewlycat \
            --no-open \
            --no-prompt \
            --force

      - name: Locate generated Xcode project
        id: locate
        run: |
          PROJ=$(find ./extension-safari-macos -maxdepth 3 -name '*.xcodeproj' | head -n 1)
          echo "Project: $PROJ"
          xcodebuild -project "$PROJ" -list
          SCHEME=$(xcodebuild -project "$PROJ" -list 2>/dev/null \
            | awk '/Schemes:/{flag=1; next} flag && NF {print; exit}' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          echo "proj=$PROJ" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Scheme: $SCHEME"

      - name: Build .app (ad-hoc signed)
        run: |
          xcodebuild \
            -project "${{ steps.locate.outputs.proj }}" \
            -scheme "${{ steps.locate.outputs.scheme }}" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            build

      - name: Package .app into zip
        run: |
          APP_PATH=$(find build/Build/Products/Release -maxdepth 2 -name '*.app' | head -n 1)
          echo "Found app: $APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" BewlyCat-safari-macos.zip
          ls -lh BewlyCat-safari-macos.zip

      - name: Upload Safari macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: BewlyCat-safari-macos
          path: BewlyCat-safari-macos.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create or update Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          files: BewlyCat-safari-macos.zip
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
